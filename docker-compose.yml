services:
  db:
    image: postgres:16-alpine
    container_name: linksharing_db
    restart: always
    environment:
      - POSTGRES_DB=linksharing
      - POSTGRES_USER=app
      - POSTGRES_PASSWORD=secret
    ports:
      - "5433:5432" # Map container's 5432 to host's 5433
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d linksharing"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    container_name: linksharing_azurite
    restart: always
    command: ["azurite", "-l", "/data", "--blobHost", "0.0.0.0", "--queueHost", "0.0.0.0", "--tableHost", "0.0.0.0", "--skipApiVersionCheck"]
    ports:
      - "10000:10000"

volumes:
  postgres_data:
