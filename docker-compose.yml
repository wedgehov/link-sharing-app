services:
  db:
    image: postgres:16-alpine
    container_name: linksharing_db
    restart: always
    environment:
      - POSTGRES_DB=linksharing
      - POSTGRES_USER=app
      - POSTGRES_PASSWORD=secret
    ports:
      - "5433:5432" # Map container's 5432 to host's 5433
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d linksharing"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: linksharing_app
    restart: always
    ports:
      - "5200:8080" # Unified app serves API + frontend
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=linksharing;Username=app;Password=secret
      - ASPNETCORE_URLS=http://+:8080 # Tell ASP.NET Core to listen on the HTTP port
      - BlobStorage__ConnectionString=DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;
      - BlobStorage__ContainerName=avatars
    depends_on:
      db:
        condition: service_healthy
      azurite:
        condition: service_started

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    container_name: linksharing_azurite
    restart: always
    ports:
      - "10000:10000"

volumes:
  postgres_data:
